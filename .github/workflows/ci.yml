on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "main"

name: "CI"

env:
  PROTOC_VERSION: "3.25.3"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable"
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable"
      - name: Generate documentation
        run: |
          cargo doc -p de-mls-gateway -p de-mls-ds -p de-mls-ui-protocol -p ui-bridge --lib --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -Dwarnings

  test:
    # macOS: the checked-in libs/libwaku.dylib (arm64) is loadable at test
    # runtime via the @rpath the crates' build scripts embed; Linux would
    # need a locally-built libwaku.so.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-macos"
      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}
      - name: Test
        run: cargo test -p de-mls-gateway -p de-mls-ds -p de-mls-ui-protocol -p ui-bridge --release
